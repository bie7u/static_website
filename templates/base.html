<!DOCTYPE html>
<html lang="en" class="no-js">
    <!-- BEGIN HEAD -->
    <head>
        <meta charset="utf-8"/>
        <title>{% block title %}Metronic "Asentus" Frontend{% endblock %}</title>
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta content="width=device-width, initial-scale=1" name="viewport"/>
        <meta content="" name="description"/>
        <meta content="" name="author"/>

        {% load static %}
        
        <!-- GLOBAL MANDATORY STYLES -->
        <link href="https://fonts.googleapis.com/css?family=Hind:300,400,500,600,700" rel="stylesheet" type="text/css">
        <link href="{% static 'vendor/simple-line-icons/simple-line-icons.min.css' %}" rel="stylesheet" type="text/css"/>
        <link href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}" rel="stylesheet" type="text/css"/>

        <!-- PAGE LEVEL PLUGIN STYLES -->
        <link href="{% static 'css/animate.css' %}" rel="stylesheet">
        <link href="{% static 'vendor/swiper/css/swiper.min.css' %}" rel="stylesheet" type="text/css"/>

        <!-- THEME STYLES -->
        <link href="{% static 'css/layout.min.css' %}" rel="stylesheet" type="text/css"/>

        <!-- Favicon -->
        <link rel="shortcut icon" href="{% static 'favicon.ico' %}"/>

        <!-- HTMX -->
        <script src="https://unpkg.com/htmx.org@1.9.10"></script>
        
        {% block extra_head %}{% endblock %}
    </head>
    <!-- END HEAD -->

    <!-- BODY -->
    <body>
        <!--========== HEADER ==========-->
        <header class="header navbar-fixed-top">
            <!-- Navbar -->
            <nav class="navbar" role="navigation">
                <div class="container">
                    <!-- Brand and toggle get grouped for better mobile display -->
                    <div class="menu-container">
                        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".nav-collapse">
                            <span class="sr-only">Toggle navigation</span>
                            <span class="toggle-icon"></span>
                        </button>

                        <!-- Logo -->
                        <div class="logo">
                            <a class="logo-wrap" href="{% url 'main:home' %}">
                                <img class="logo-img logo-img-main" src="{% static 'img/logo.png' %}" alt="Asentus Logo">
                                <img class="logo-img logo-img-active" src="{% static 'img/logo-dark.png' %}" alt="Asentus Logo">
                            </a>
                        </div>
                        <!-- End Logo -->

                        <!-- Collect the nav links, forms, and other content for toggling -->
                        <div class="collapse navbar-collapse nav-collapse">
                            <div class="menu-container">
                                <ul class="navbar-nav navbar-nav-right">
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:home' %}"
                                           hx-get="{% url 'main:home' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">Home</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:about' %}"
                                           hx-get="{% url 'main:about' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">About</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:products' %}"
                                           hx-get="{% url 'main:products' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">Products</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:work' %}"
                                           hx-get="{% url 'main:work' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">Work</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:pricing' %}"
                                           hx-get="{% url 'main:pricing' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">Pricing</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:faq' %}"
                                           hx-get="{% url 'main:faq' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">FAQ</a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-item-child nav-item-hover" 
                                           href="{% url 'main:contact' %}"
                                           hx-get="{% url 'main:contact' %}"
                                           hx-target="#main-content"
                                           hx-push-url="true">Contact</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <!-- End Navbar Collapse -->
                    </div>
                </div>
            </nav>
            <!-- Navbar -->
        </header>
        <!--========== END HEADER ==========-->

        <!-- Main Content Container for HTMX swaps -->
        <div id="main-content">
            {% block content %}{% endblock %}
        </div>

        <!--========== FOOTER ==========-->
        <footer class="footer">
            <div class="content container">
                <div class="row">
                    <div class="col-xs-6">
                        <img class="footer-logo" src="{% static 'img/logo.png' %}" alt="Asentus Logo">
                    </div>
                    <div class="col-xs-6 text-right sm-text-left">
                        <p class="margin-b-0"><a class="color-base fweight-700" href="http://keenthemes.com/preview/asentus/">Asentus</a> Theme Powered by: <a class="color-base fweight-700" href="http://www.keenthemes.com/">KeenThemes.com</a></p>
                    </div>
                </div>
                <!--// end row -->
            </div>
        </footer>
        <!--========== END FOOTER ==========-->

        <!-- Back To Top -->
        <a href="javascript:void(0);" class="js-back-to-top back-to-top">Top</a>

        <!-- JAVASCRIPTS(Load javascripts at bottom, this will reduce page load time) -->
        <!-- CORE PLUGINS -->
        <script src="{% static 'vendor/jquery.min.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/jquery-migrate.min.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/bootstrap/js/bootstrap.min.js' %}" type="text/javascript"></script>

        <!-- PAGE LEVEL PLUGINS -->
        <script src="{% static 'vendor/jquery.easing.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/jquery.back-to-top.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/jquery.smooth-scroll.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/jquery.wow.min.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/jquery.parallax.min.js' %}" type="text/javascript"></script>
        <script src="{% static 'vendor/swiper/js/swiper.jquery.min.js' %}" type="text/javascript"></script>

        <!-- PAGE LEVEL SCRIPTS -->
        <script src="{% static 'js/layout.min.js' %}" type="text/javascript"></script>
        <script src="{% static 'js/components/swiper.min.js' %}" type="text/javascript"></script>

        <!-- HTMX Configuration -->
        <script>
            // Configure HTMX
            document.body.addEventListener('htmx:configRequest', function(evt) {
                evt.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
            });

            // Re-initialize JavaScript components after HTMX swap
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                // Re-initialize layout components
                if (typeof Layout !== 'undefined') {
                    Layout.init();
                }
                
                // Re-initialize WOW animations
                if (typeof WOW !== 'undefined') {
                    new WOW().init();
                }
                
                // Re-initialize any other components as needed
                if (typeof Swiper !== 'undefined') {
                    // Re-initialize Swiper if present on the new content
                    $('.js-swiper').each(function() {
                        new Swiper(this, {
                            // Swiper configuration
                            autoplay: {
                                delay: 5000,
                            },
                            loop: true,
                            navigation: {
                                nextEl: '.swiper-button-next',
                                prevEl: '.swiper-button-prev',
                            },
                        });
                    });
                }
            });

            // Disable default form submission for HTMX forms
            document.body.addEventListener('submit', function(evt) {
                if (evt.target.hasAttribute('hx-post') || evt.target.hasAttribute('hx-get')) {
                    evt.preventDefault();
                }
            });
        </script>

        {% block extra_js %}{% endblock %}
    </body>
    <!-- END BODY -->
</html>
